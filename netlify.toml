# Netlify deployment for Tiger Credit Card onboarding prototype
# Repo: https://github.com/TheRuKa7/bluemachines_sample

[build]
  command = "pnpm run build:netlify"
  publish = "artifacts/tiger-prototype/dist/public"

[build.environment]
  NODE_VERSION = "22"
  PNPM_VERSION = "10.12.4"
  PORT = "4173"
  BASE_PATH = "/"
  CI = "true"
  VITE_VAPI_PUBLIC_KEY = "7eb1f78f-53d5-4a6d-8efe-af3e9a045157"
  VITE_VAPI_ASSISTANT_ID = "c341c52c-69bb-4a37-a6f8-b31d1910273f"
  VAPI_PRIVATE_KEY = "1ca3efaa-6fa4-4eb6-b90b-149a452146be"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"
  included_files = ["artifacts/tiger-prototype/src/data/**"]

# API route for VAPI session (server key patches assistant before call)
[[redirects]]
  from = "/api/vapi-session"
  to = "/.netlify/functions/vapi-session"
  status = 200

# SPA fallback — must come after API redirects
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[context.production]
  environment = { NODE_ENV = "production" }

[context.deploy-preview]
  environment = { NODE_ENV = "production" }
